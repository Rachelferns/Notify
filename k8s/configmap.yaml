apiVersion: v1
kind: ConfigMap
metadata:
  name: notify-config
  namespace: notify
data:
  FRONTEND_PORT: "3000"
  GATEWAY_PORT: "5003"
  NOTICE_SERVICE_PORT: "5001"
  AUTH_SERVICE_PORT: "5002"
  # Internal service discovery names used by the gateway inside Kubernetes.
  NOTICE_SERVICE_URL: "http://notice-service:5001"
  AUTH_SERVICE_URL: "http://auth-service:5002"
